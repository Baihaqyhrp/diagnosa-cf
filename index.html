<!doctype html>
<html>
  <head>
    <title>Sistem Diagnosa Gangguan Tidur & Mental</title>

    <!-- TAMBAHAN AGAR RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
      body {
        font-family: "Segoe UI", Arial;
        background: linear-gradient(135deg, #eef2f7, #d9e4f5);
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 550px;
        margin: auto;
      }

      .header {
        background: #007bff;
        color: white;
        padding: 15px;
        text-align: center;
        border-radius: 12px 12px 0 0;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 0 0 12px 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-3px);
      }

      select,
      input,
      button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
      }

      select:focus,
      input:focus {
        outline: none;
        border-color: #007bff;
        box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
      }

      button {
        border: none;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }

      button:hover {
        opacity: 0.9;
        transform: scale(1.02);
      }

      .btn-hasil {
        background: #28a745;
      }
      .btn-simpan {
        background: #dc3545;
      }

      .result {
        margin-top: 20px;
        background: #e9f7ef;
        padding: 15px;
        border-radius: 8px;
      }

      .result h3 {
        margin-top: 0;
        color: #155724;
      }

      /* PROGRESS BAR */
      .progress {
        background: #ddd;
        border-radius: 20px;
        margin-bottom: 10px;
        overflow: hidden;
      }

      .progress-bar {
        height: 20px;
        background: linear-gradient(90deg, #007bff, #00c6ff);
        color: white;
        text-align: center;
        font-size: 12px;
        line-height: 20px;
        transition: width 0.5s;
      }

      /* BOX LAPORAN */
      .lampiran-box {
        margin-top: 15px;
        font-family: monospace;
        font-size: 11px;
        background: #fff8dc;
        padding: 10px;
        border-radius: 6px;
        white-space: pre-wrap;
        border: 1px solid #ead6a5;
      }

      /* TAMBAHAN RESPONSIVE HP */
      @media (max-width: 600px) {
        body {
          padding: 10px;
        }

        .card {
          padding: 15px;
        }

        h2 {
          font-size: 18px;
        }

        select,
        input,
        button {
          font-size: 14px;
          padding: 8px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header"><h2>Sistem Pakar Diagnosa CF</h2></div>
      <div class="card">
        <input type="text" id="nama" placeholder="Nama Pasien" />
        <div id="pertanyaan"></div>
        <button class="btn-hasil" onclick="diagnosa()">Lihat Hasil</button>
        <button class="btn-simpan" onclick="simpan()">Simpan Data</button>
        <div id="hasil"></div>
      </div>
    </div>

    <script>
      const bobotPakar = {
        g1: 0.6,
        g2: 0.6,
        g3: 0.8,
        g4: 0.4,
        g5: 0.7,
        g6: 0.5,
        g7: 0.6,
        g8: 0.4,
        g9: 0.5,
        g10: 0.3,
      };

      const penyakit = {
        insomnia: ["g1", "g2", "g4"],
        apnea: ["g3", "g5"],
        anxiety: ["g6", "g7", "g8", "g9"],
      };

      const pertanyaanList = [
        "Sulit tidur",
        "Sering terbangun",
        "Mendengkur",
        "Lelah saat bangun",
        "Sesak saat tidur",
        "Jantung berdebar",
        "Cemas berlebihan",
        "Sulit fokus",
        "Gelisah",
        "Berkeringat malam",
      ];

      const opsi = `
<option value="0">Tidak (0)</option>
<option value="0.2">Tidak Tahu (0.2)</option>
<option value="0.4">Sedikit (0.4)</option>
<option value="0.6">Cukup (0.6)</option>
<option value="0.8">Yakin (0.8)</option>
<option value="1">Sangat Yakin (1)</option>`;

      let html = "";
      for (let i = 0; i < 10; i++) {
        html += `<p style="margin-top:15px;"><b>G0${i + 1}</b>: ${pertanyaanList[i]}</p>
             <select id="g${i + 1}">${opsi}</select>`;
      }
      document.getElementById("pertanyaan").innerHTML = html;

      let hasilAkhir = "",
        persenAkhir = "",
        laporanLengkap = "";

      function hitungCF(list) {
        let cfList = [],
          detail = "";

        list.forEach((g) => {
          let user = parseFloat(document.getElementById(g).value);
          if (user > 0) {
            let cf = bobotPakar[g] * user;
            cfList.push(cf);
            detail += `${g.toUpperCase()}: ${bobotPakar[g]} x ${user} = ${cf.toFixed(4)}\n`;
          }
        });

        if (cfList.length == 0)
          return { cf: 0, det: "Tidak ada gejala dipilih\n" };

        let combine = cfList[0];
        detail += `\nCF Awal = ${combine.toFixed(4)}\n`;

        for (let i = 1; i < cfList.length; i++) {
          let old = combine;
          combine = old + cfList[i] * (1 - old);
          detail += `Combine ${i}: ${old.toFixed(4)} + ${cfList[i].toFixed(4)} * (1 - ${old.toFixed(4)}) = ${combine.toFixed(4)}\n`;
        }

        return { cf: combine, det: detail };
      }

      function diagnosa() {
        let namaUser = document.getElementById("nama").value;
        if (!namaUser) {
          alert("Isi nama pasien dulu!");
          return;
        }

        let res = {
          insomnia: hitungCF(penyakit.insomnia),
          apnea: hitungCF(penyakit.apnea),
          anxiety: hitungCF(penyakit.anxiety),
        };

        let persen = {
          insomnia: res.insomnia.cf * 100,
          apnea: res.apnea.cf * 100,
          anxiety: res.anxiety.cf * 100,
        };

        let max = 0,
          namaKey = "";
        for (let p in persen) {
          if (persen[p] > max) {
            max = persen[p];
            namaKey = p;
          }
        }

        if (namaKey == "insomnia") hasilAkhir = "Insomnia";
        else if (namaKey == "apnea") hasilAkhir = "Sleep Apnea";
        else if (namaKey == "anxiety") hasilAkhir = "Anxiety Disorder";
        else hasilAkhir = "Normal";

        persenAkhir = max.toFixed(2);

        let keterangan = "";
        if (max > 80) keterangan = "Tingkat keyakinan sangat tinggi";
        else if (max > 60) keterangan = "Kemungkinan besar";
        else if (max > 40) keterangan = "Kemungkinan sedang";
        else keterangan = "Kemungkinan rendah";

        laporanLengkap = `=== INSOMNIA ===\n${res.insomnia.det}
=== SLEEP APNEA ===\n${res.apnea.det}
=== ANXIETY ===\n${res.anxiety.det}

HASIL AKHIR: ${hasilAkhir} (${persenAkhir}%)`;

        document.getElementById("hasil").innerHTML = `
    <div class="result">
        <h3>Hasil: ${hasilAkhir} (${persenAkhir}%)</h3>
        <p><b>Keterangan:</b> ${keterangan}</p>

        <div>Insomnia</div>
        <div class="progress"><div class="progress-bar" style="width:${persen.insomnia}%">${persen.insomnia.toFixed(0)}%</div></div>

        <div>Sleep Apnea</div>
        <div class="progress"><div class="progress-bar" style="width:${persen.apnea}%">${persen.apnea.toFixed(0)}%</div></div>

        <div>Anxiety Disorder</div>
        <div class="progress"><div class="progress-bar" style="width:${persen.anxiety}%">${persen.anxiety.toFixed(0)}%</div></div>

        <div class="lampiran-box">${laporanLengkap}</div>

        <p style="font-size:11px; color:#888;">
        Hasil ini hanya bersifat simulasi sistem pakar, bukan diagnosis medis resmi.
        </p>
    </div>`;
      }

      function simpan() {
        let namaUser = document.getElementById("nama").value;
        if (!namaUser || !persenAkhir) {
          alert("Lengkapi data!");
          return;
        }

        let data = {
          nama: namaUser,
          hasil: hasilAkhir,
          persen: persenAkhir + "%",
          perhitungan: "'" + laporanLengkap,
        };

        for (let i = 1; i <= 10; i++) {
          let element = document.getElementById("g" + i);
          data["g" + i] = element.options[element.selectedIndex].text;
        }

        fetch(
          "https://script.google.com/macros/s/AKfycbzqQg4WzqiJIY74gdjekSiW_XLYpl2KjrPHxRV97JuekA6eMfSGu9DsLPyVyZD6uA50mg/exec",
          {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(data),
          },
        )
          .then(() => {
            alert("Data Berhasil Disimpan!");
            location.reload();
          })
          .catch(() => alert("Gagal Simpan!"));
      }
    </script>
  </body>
</html>
